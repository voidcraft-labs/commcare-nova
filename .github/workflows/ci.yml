name: CI

# Runs the quality gate the local git hooks enforce, plus a production build,
# on every pull request. This is what actually verifies Dependabot's
# dependency-bump PRs before anyone merges them.
#
# No push:[main] trigger on purpose: the branch ruleset requires PRs to be up to
# date with main before merging, so the PR run already verified the exact commit
# that lands — a re-run on main would be redundant. It also couldn't gate the
# deploy, since the Cloud Build trigger (cloudbuild.yaml) fires on the same push
# independently and never waited on this workflow.
on:
  pull_request:

# A newer push to the same branch/PR cancels the in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for the GITHUB_TOKEN: every job here only reads the repo to
# build and test it — none push, comment, or publish — so the default token
# scope is narrowed to read-only across the whole workflow.
permissions:
  contents: read

# `.nvmrc` is canonical for Node; package.json's `devEngines` is canonical for
# npm and mirrors Node so npm can enforce both before commands run. Every setup
# below reads those versions, and the `quality` guard asserts the Dockerfile and
# package metadata match, so CI, the deployed image, and local tooling can't
# drift. Pin the exact production patches: the floating `22` major silently
# advanced to 22.23.0, whose undici regression took prod login down (#143), and
# a green CI on a different patch would have masked it. Bump `.nvmrc` and its
# mirrors together; the guard flags any drift.

jobs:
  quality:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Enforce both sources of truth. A runtime drift here is the #143 class —
      # CI green on different tooling than the production image ships.
      - name: Runtime versions are single-sourced
        run: |
          nvmrc="$(cat .nvmrc)"
          docker_node="$(sed -n 's/^ARG NODE_IMAGE=node:\([0-9.]*\)-.*/\1/p' Dockerfile)"
          package_node="$(jq -r '.devEngines.runtime.version' package.json)"
          package_npm="$(jq -r '.devEngines.packageManager.version' package.json)"
          docker_npm="$(sed -n 's/^ARG NPM_VERSION=\([0-9.]*\).*/\1/p' Dockerfile)"
          if [ "$nvmrc" != "$docker_node" ] || [ "$nvmrc" != "$package_node" ]; then
            echo "::error::Node drift: .nvmrc=$nvmrc, package.json=$package_node, Dockerfile=$docker_node. Update both mirrors to match .nvmrc."
            exit 1
          fi
          if [ "$package_npm" != "$docker_npm" ]; then
            echo "::error::npm drift: package.json=$package_npm but the Dockerfile pins $docker_npm. Update the Dockerfile ARG NPM_VERSION to match package.json."
            exit 1
          fi
          echo "Node $nvmrc and npm $package_npm are pinned consistently."
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          # setup-node's npm cache lookup runs before we can replace the npm 11
          # bundled with Node 24, so the exact npm 12 devEngine rejects it.
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - name: Lint (Biome)
        run: npm run lint
      - name: Type-check
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # The suite boots a Postgres testcontainer and applies the case-store
      # migrations in-process via Kysely's Migrator
      # (lib/case-store/sql/__tests__/applyMigrations.ts), so no migration CLI
      # is needed on PATH. ubuntu-latest already runs a Docker daemon for the
      # container itself.
      - name: Test suite
        run: npm test

  leaks:
    name: Async-leak gate
    runs-on: ubuntu-latest
    # The detector's per-async-op instrumentation inflates every test's wall
    # time, so `test:leaks` runs a 30s test timeout (vs the default 5s) — on a
    # large PR the changed-vs-base set is big enough that heavy tests would
    # otherwise cross 5s under parallel load and spuriously fail (a timed-out
    # test also leaks its in-flight promise into the next test). 30 job-minutes
    # keeps headroom for that slower-but-honest completion.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          # `vitest --changed` diffs the working tree against the PR base to
          # decide which tests to run; that needs the base commit present in
          # local history, which the default depth-1 checkout omits.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # Scope the leak sweep to what the PR touched. `vitest --changed <base>`
      # runs only the test files whose module import graph reaches a changed
      # file — including unchanged tests that import a changed source file, so
      # a leak introduced in `lib/` is still caught by its existing test.
      # Sound because the async-leak detector attributes each leaked resource
      # to the single test file that created it (no cross-file leak), so an
      # unchanged graph reproduces a byte-identical, already-green run; the
      # full suite still ran at this PR's merge base. A change to a shared
      # input outside every graph (config, setup, deps) re-sweeps everything
      # via `forceRerunTriggers` in vitest.config.ts. `--passWithNoTests`
      # makes a PR that touches no covered code a green no-op.
      - name: Changed tests under the async-leak detector
        run: npm run test:leaks -- --changed "$PR_BASE_SHA" --passWithNoTests
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # next build resolves the fumadocs `@/.source/server` import; this
      # generates it first, the same way the typecheck script does before tsc.
      - name: Generate fumadocs sources
        run: npx fumadocs-mdx
      - name: Build
        run: npm run build

  smoke:
    name: Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # Cache the Chromium binary (~150MB) so it isn't re-downloaded every run.
      # Keyed on the whole lockfile (coarse — any dep bump re-saves, but
      # restore-keys still serves the existing binary, so no re-download).
      # `--with-deps` still installs the (apt) OS deps, which are fast.
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright (Chromium + OS deps)
        run: npx playwright install --with-deps chromium
      # Hermetic: local Postgres + seeded session. No real GCP, no prod
      # credentials, no LLM spend. Runs the credential-free `public` checks and
      # the seeded-session `authed` checks. This catches UI / route / render /
      # session-contract breaks — but NOT the outbound dependency breaks (the
      # local stack networks nothing out); the `auth-healthz` job below is the
      # gate for those.
      - name: Smoke suite
        run: npm run test:smoke -- --project=public --project=authed
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  auth-healthz:
    # The required-check NAME below ("Auth Firestore healthz") is PINNED by the
    # branch ruleset — keep it verbatim even though the job no longer probes
    # Firestore. It now runs ONE probe over the real outbound HTTP stack on the
    # prod-pinned Node (the local-Postgres smoke can't catch this class): the
    # auth credential path — login runs through the Cloud SQL connector, which
    # mints its cert + IAM token via google-auth-library → gaxios → node-fetch
    # (the #143/#145 outage class). scripts/ci/auth-healthz.ts exercises that
    # stack directly (a WIF token mint, no database). Its failure reds this
    # required gate.
    name: Auth Firestore healthz
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # WIF needs to mint an OIDC token; everything else stays read-only. Job-level
    # permissions REPLACE the workflow default, so `contents: read` is restated
    # for checkout.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      # Keyless auth to the isolated commcare-nova-ci project: GitHub's OIDC
      # token is exchanged via Workload Identity Federation for a CI service
      # account whose ONLY access is that dataless project. No long-lived keys
      # exist anywhere; the WIF provider is org-restricted and the SA is bound
      # only to this repo.
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.CI_GCP_PROJECT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
      # Auth credential path: mint a token over the prod outbound stack. A
      # regression there (undici / gaxios / node-fetch keep-alive) throws or hangs
      # here and reds the PR.
      - name: Auth credential — token mint over the prod outbound stack
        run: npx tsx scripts/ci/auth-healthz.ts

  auth-contract:
    # Gates the session-cookie contract (a forged cookie ⇄ the real
    # better-auth / better-call session read path) on every PR. The test seeds +
    # asserts against Better Auth's Kysely/Postgres adapter on a per-test
    # testcontainer database (booted by the case-store vitest globalSetup) — no
    # emulator, no ADC. See lib/db/__tests__/sessionCookie.integration.test.ts.
    name: Auth session-cookie contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install pinned npm
        run: |
          npm_version="$(node -p "require('./package.json').devEngines.packageManager.version")"
          cd "$RUNNER_TEMP"
          npm install --global "npm@$npm_version" --ignore-scripts
      - name: Cache npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - name: Session-cookie contract (Postgres testcontainer)
        run: node_modules/.bin/vitest run sessionCookie.integration.test.ts
