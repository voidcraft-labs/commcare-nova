# Every command carries a `fail_text`. Lefthook prints it on the command's
# summary line when the command exits non-zero — the one line that survives
# directly above git's generic "failed to push some refs" / "commit aborted",
# so a blocked commit/push always states WHAT failed and HOW to fix it instead
# of burying the reason in scrollback. Each message names a concrete next step
# (a script to run, a boundary to respect) rather than restating the rule.
#
# Formatting is auto-fixed at the source: the pre-commit `check` runs Biome with
# `--write` + `stage_fixed`, so staged files are reformatted and re-staged before
# the commit lands. The pre-push `check` is verify-only (it never mutates the
# working tree mid-push); when it trips on an unstaged or generated file, the
# fail_text points at `npm run format`.

pre-commit:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
      # `--write` already auto-fixed formatting and re-staged; reaching here means
      # a lint rule Biome can't safely auto-fix (e.g. a noRestrictedImports
      # boundary). The diagnostics are above.
      fail_text: "Biome found a lint problem it can't auto-fix (above). Run `npm run lint` to see it, fix it, then commit again."
    atlas-migrate-lint:
      # File filter scopes to the case-store migrations directory so the hook
      # fires only when an autogenerated migration changes — atlas's lint
      # analyzer enforces the destructive-change policy from atlas.hcl's
      # `lint { destructive { error = true } }` block, blocking the commit
      # when a generated migration carries a DROP that the diff-time
      # auto-skip didn't catch.
      glob: "lib/case-store/migrations/*.sql"
      run: atlas migrate lint --env local --latest 1
      fail_text: "Atlas flagged a destructive change in a generated migration (above). Review it against atlas.hcl's lint policy before committing."
pre-push:
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {push_files}
      # Verify-only (no `--write`): pushing must never silently reformat the
      # working tree. A failure here is usually an unstaged or generated file in
      # the wrong style — `npm run format` fixes formatting; `npm run lint` lists
      # any lint errors that need a manual fix.
      fail_text: "Biome found formatting/lint problems (above). Run `npm run format` to auto-fix formatting — often an unstaged generated file like skills-lock.json in the wrong indent — then commit and re-push. `npm run lint` lists any remaining lint errors."
    # Whole-project type-check. Runs at pre-push (not pre-commit) because
    # tsc scans the full project and is too slow to gate every commit, but
    # fast enough to gate before publishing. Generates fumadocs's `.source/`
    # first so `lib/docs/source.ts`'s `@/.source/server` import resolves.
    # This is the enforcement surface for `@ts-expect-error` directives in
    # test files — without it, those directives are advisory only.
    typecheck:
      run: npm run typecheck
      fail_text: "TypeScript found type errors (above). Run `npm run typecheck`, fix them, then push."
    # The async-leak gate (full suite under `--detect-async-leaks`) runs in CI
    # — `.github/workflows/ci.yml` — rather than at pre-push: the async_hooks
    # instrumentation is too slow to gate every push. Reproduce a CI leak
    # failure locally with `npm run test:leaks`; see the "Testing —
    # async-resource leaks" section in CLAUDE.md.
