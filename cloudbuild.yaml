# Cloud Build (main-push trigger): build the app image, push it, run pending
# case-store migrations once via the migrate Job, then deploy a new Cloud Run
# revision.
#
# Migrations run as a dedicated Cloud Run Job here — NOT on every container
# boot — so a cold start is just Node coming up (no Cloud SQL connect + Atlas
# advisory-lock wait on the startup critical path). The Job reuses the app
# image with a command override. If the migration fails the build stops before
# `deploy`, so the old revision keeps serving and we never ship code ahead of a
# failed schema change (same guarantee the old startup CMD gave, at deploy time).
steps:
  # Two values ride into the image build as build args because `next build`
  # consumes them at BUILD time, not runtime:
  #   • SENTRY_AUTH_TOKEN (Secret Manager: `nova-sentry`) — lets the build
  #     upload source maps; without it every Sentry stack trace stays minified.
  #   • NEXT_PUBLIC_GOOGLE_MAPS_API_KEY (Secret Manager: `nova-google_maps_api_key`,
  #     the PROD browser key, referrer-restricted to commcare.app) +
  #     NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID (a public, non-secret identifier, inlined
  #     literally) — `NEXT_PUBLIC_` vars are baked into the client bundle by
  #     `next build`, so a Cloud Run runtime env var would NOT reach them; they
  #     must be present at build. Without them the geopoint picker degrades to
  #     manual lat/lon entry.
  # Secrets only reach a step through env vars, and env vars only expand under a
  # shell, hence the bash wrapper. The trigger's service account needs
  # `roles/secretmanager.secretAccessor` on each secret or the build fails
  # before this step runs.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv: ["SENTRY_AUTH_TOKEN", "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"]
    args:
      - -c
      - |
        set -euo pipefail
        docker build \
          -t "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/app:$COMMIT_SHA" \
          --build-arg SENTRY_AUTH_TOKEN="$$SENTRY_AUTH_TOKEN" \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="$$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID="ac18fb2d87e44a1eb5a19883" \
          -f Dockerfile .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/app:$COMMIT_SHA"

  # Apply pending case-store migrations against live Cloud SQL, once. `jobs
  # deploy` is create-or-update (idempotent) so the Job's config lives here in
  # version control and stays pinned to the image being deployed. The Job
  # mirrors the service's identity + network so Atlas's `prod` env resolves:
  # the IAM service account, Direct VPC Egress (private-IP Cloud SQL), and the
  # NOVA_DB_* vars its `postgres://` URL composes from. `execute --wait` fails
  # the build on a non-zero migration exit.
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run jobs deploy commcare-nova-migrate \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/app:$COMMIT_SHA \
          --region=us-central1 \
          --service-account=commcare-nova@commcare-nova.iam.gserviceaccount.com \
          --network=default --subnet=default --vpc-egress=private-ranges-only \
          --set-env-vars=NOVA_DB_USER=commcare-nova@commcare-nova.iam,NOVA_DB_HOST=10.9.160.3,NOVA_DB_NAME=nova_cases \
          --command=atlas \
          --args=migrate,apply,--env,prod,--allow-dirty \
          --max-retries=1 \
          --task-timeout=600
        gcloud run jobs execute commcare-nova-migrate --region=us-central1 --wait

  # `--min-instances=1` is pinned here on purpose: a bare `gcloud run deploy`
  # carries forward existing scaling, but pinning it means a fresh service or a
  # reset can't silently drop back to scale-to-zero (which exposes the cold
  # boot on every idle return). Keep it explicit.
  #
  # `--startup-probe` points at `/warmup` (see `app/(app)/warmup/page.tsx`):
  # a new instance only takes traffic once it has rendered a page, which
  # forces the multi-second lazy load of the server module graph to happen
  # BEFORE readiness instead of inside a user's first request. Node listens
  # within ~1s of boot, so a TCP probe would mark the instance ready while
  # that cost is still unpaid — every deploy and autoscale-up would route
  # users onto a module-cold instance.
  #
  # Probe math is platform-constrained: timeoutSeconds must not exceed
  # periodSeconds, and failureThreshold × periodSeconds caps at 240s. The
  # 10s timeout lets a single attempt wait out the first render (~6s warm
  # cost); 24 × 10s gives the full four-minute window before the instance
  # is declared failed — in practice the second attempt succeeds. The probe
  # port is Cloud Run's default container port; if a `--port` override ever
  # lands here, httpGet.port must move with it.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - commcare-nova
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/app:$COMMIT_SHA
      - --region=us-central1
      - --min-instances=1
      - --startup-probe=httpGet.path=/warmup,httpGet.port=8080,initialDelaySeconds=0,timeoutSeconds=10,periodSeconds=10,failureThreshold=24

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/nova-sentry/versions/latest
      env: SENTRY_AUTH_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/nova-google_maps_api_key/versions/latest
      env: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
