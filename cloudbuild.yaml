# Cloud Build pipeline for the multi-container (nginx h2c ingress + Next app)
# deploy. Point the main-push trigger at this file (Configuration =
# "Cloud Build configuration file", location /cloudbuild.yaml) in place of the
# auto-generated source-deploy build, which can only deploy a single container.
steps:
  - id: build-app
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "$_APP_IMAGE", "-f", "Dockerfile", "."]

  - id: build-nginx
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "$_NGINX_IMAGE", "-f", "docker/nginx.Dockerfile", "."]

  - id: push-app
    name: gcr.io/cloud-builders/docker
    args: ["push", "$_APP_IMAGE"]

  - id: push-nginx
    name: gcr.io/cloud-builders/docker
    args: ["push", "$_NGINX_IMAGE"]

  # Substitute the freshly built image tags into the service spec, then replace
  # the live service declaratively.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        sed -e "s|__APP_IMAGE__|$_APP_IMAGE|g" \
            -e "s|__NGINX_IMAGE__|$_NGINX_IMAGE|g" \
            service.yaml > /workspace/service.resolved.yaml
        gcloud run services replace /workspace/service.resolved.yaml \
            --region="$_REGION" --quiet

substitutions:
  _REGION: us-central1
  _APP_IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/app:$COMMIT_SHA
  _NGINX_IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/commcare-nova/nginx:$COMMIT_SHA

images:
  - $_APP_IMAGE
  - $_NGINX_IMAGE

options:
  logging: CLOUD_LOGGING_ONLY
