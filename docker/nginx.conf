# Ingress sidecar server block (included by the unprivileged base's http{}).
#
# Cloud Run routes to the nginx container's port (named `h2c` in service.yaml),
# so the GFE→container hop is HTTP/2 cleartext — which carries no 32 MiB
# request cap, the whole reason this proxy exists. nginx terminates h2c and
# proxies HTTP/1.1 to the Next app container over the loopback.
#
# The nginxinc/nginx-unprivileged base already routes pid/temp/logs for
# non-root operation, so this file only declares the server.
server {
    listen 8080;
    http2 on;
    server_name _;

    # Above the largest asset cap (video); the upload route enforces the exact
    # per-kind cap as it streams.
    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        # Stream the request body through to the app instead of buffering it.
        proxy_request_buffering off;
        # Stream the RESPONSE through too: the chat route emits SSE, which
        # nginx's default response buffering would batch into delayed bursts.
        proxy_buffering off;
        # Match Cloud Run's request timeout (timeoutSeconds: 3600). nginx's 60s
        # default would 504 a long generation step (compile, HQ upload) that
        # streams no bytes for a minute — a regression vs talking to Next direct.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        # Forward GFE's X-Forwarded-For UNCHANGED. proxy.ts trusts the rightmost
        # entry as GFE's real-client appendage; appending an nginx hop (the
        # $proxy_add_x_forwarded_for default) would shift it and break client-IP
        # attribution and rate limiting.
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }
}
